name: Build Emacs Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GNU Emacs Source
        uses: actions/checkout@v4
        with:
          repository: emacs-mirror/emacs
          ref: master

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf make gcc texinfo libncurses-dev ncurses-bin m4 g++ git nasm

      - name: Accept Licenses and Install Android NDK
        run: |
          # O comando 'yes' envia 'y' infinitamente para aceitar todas as licenças do Google
          yes | sdkmanager --licenses || true
          yes | sdkmanager 'platforms;android-34' 'build-tools;34.0.0' 'ndk;26.3.11579264'

      - name: Configure and Build
        run: |
          export SDK=$ANDROID_HOME
          export NDK=$ANDROID_HOME/ndk/26.3.11579264
          
          # Compila o terminfo necessário para o terminal interno do Emacs
          cd etc/e
          tic -o ../ ./eterm-color.ti || true
          cd ../../
          
          ./autogen.sh
          
          # Configuração exata para ARM64 (aarch64)
          ./configure             --with-android=$SDK/platforms/android-34/android.jar             ANDROID_CC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang             SDK_BUILD_TOOLS=$SDK/build-tools/34.0.0             --with-gnutls=ifavailable             --without-android-debug
            
          make -j$(nproc)

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emacs-Android-APK
          path: java/emacs*.apk
