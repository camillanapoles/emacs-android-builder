name: Build Emacs Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GNU Emacs Source
        uses: actions/checkout@v4
        with:
          repository: emacs-mirror/emacs
          ref: master

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf make gcc texinfo libncurses-dev ncurses-bin m4 g++ git nasm pkg-config

      - name: Accept Licenses and Install Android NDK
        run: |
          yes | sdkmanager --licenses || true
          yes | sdkmanager 'platforms;android-34' 'build-tools;34.0.0' 'ndk;26.3.11579264'

      - name: Configure and Build
        run: |
          # Busca dinâmica dos caminhos exatos para evitar erros de path
          export SDK=$ANDROID_HOME
          export NDK=$ANDROID_HOME/ndk/26.3.11579264
          export PATH=$SDK/build-tools/34.0.0:$PATH
          
          ANDROID_JAR=$(find $SDK/platforms -name "android.jar" | grep "android-34" | head -n 1)
          CLANG_BIN=$(find $NDK/toolchains/llvm -name "aarch64-linux-android34-clang" | head -n 1)
          CLANGXX_BIN=$(find $NDK/toolchains/llvm -name "aarch64-linux-android34-clang++" | head -n 1)
          
          echo "Found android.jar at: $ANDROID_JAR"
          echo "Found clang at: $CLANG_BIN"
          
          if [ -z "$ANDROID_JAR" ] || [ -z "$CLANG_BIN" ]; then
            echo "Error: Could not find android.jar or clang compiler."
            exit 1
          fi
          
          # Prepara o autoconf
          ./autogen.sh
          
          # Configuração exata e isolada para Android ARM64
          ./configure             --with-android=$ANDROID_JAR             ANDROID_CC=$CLANG_BIN             ANDROID_CXX=$CLANGXX_BIN             SDK_BUILD_TOOLS=$SDK/build-tools/34.0.0             --without-x             --without-dbus             --without-gconf             --without-gsettings             --without-selinux             --with-gnutls=ifavailable             --without-android-debug
            
          # Compilação
          make -j$(nproc)

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emacs-Android-APK
          path: java/emacs*.apk
