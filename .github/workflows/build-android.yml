name: Build Emacs Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GNU Emacs Source
        uses: actions/checkout@v4
        with:
          repository: emacs-mirror/emacs
          ref: master

      - name: Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Android SDK & NDK
        uses: actions/cache@v4
        id: cache-android
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/26.3.11579264
            /usr/local/lib/android/sdk/platforms/android-34
            /usr/local/lib/android/sdk/build-tools/34.0.0
          key: ${{ runner.os }}-android-sdk-ndk-26.3-api34

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf make gcc texinfo libncurses-dev ncurses-bin m4 g++ git nasm pkg-config

      - name: Accept Licenses and Install Android NDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses || true
          yes | sdkmanager 'platforms;android-34' 'build-tools;34.0.0' 'ndk;26.3.11579264'

      - name: Configure and Build
        run: |
          export SDK=$ANDROID_HOME
          export NDK=$ANDROID_HOME/ndk/26.3.11579264
          export PATH=$SDK/build-tools/34.0.0:$PATH
          
          ANDROID_JAR=$SDK/platforms/android-34/android.jar
          CLANG_BIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang
          CLANGXX_BIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang++
          
          echo "Using android.jar at: $ANDROID_JAR"
          echo "Using clang at: $CLANG_BIN"
          
          ./autogen.sh
          
          # Executa o configure. Se falhar, exibe o config.log para auditoria exata.
          if ! ./configure             --with-android=$ANDROID_JAR             ANDROID_CC=$CLANG_BIN             ANDROID_CXX=$CLANGXX_BIN             SDK_BUILD_TOOLS=$SDK/build-tools/34.0.0             --without-x             --without-dbus             --without-gconf             --without-gsettings             --without-selinux             --with-gnutls=ifavailable             --without-android-debug; then
              echo "================ CONFIG.LOG =================="
              cat config.log
              echo "=============================================="
              exit 1
          fi
            
          # Compilação
          make -j$(nproc)

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emacs-Android-APK
          path: java/emacs*.apk
